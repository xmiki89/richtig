<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Registrierung Test</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-container {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
        }
        button {
            background: #4a9eff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin: 10px 5px;
        }
        button:hover {
            background: #3a8eef;
        }
        .result {
            background: #333;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        .success { border-left: 4px solid #4CAF50; }
        .error { border-left: 4px solid #f44336; }
        .info { border-left: 4px solid #2196F3; }
    </style>
</head>
<body>
    <h1>🧪 MongoDB Registrierung Test</h1>
    
    <div class="test-container">
        <h2>Neues Mitglied registrieren</h2>
        <input type="text" id="testName" placeholder="Vorname" value="Test">
        <input type="text" id="testNachname" placeholder="Nachname" value="User">
        <input type="email" id="testEmail" placeholder="Email" value="test@example.com">
        <input type="text" id="testId" placeholder="ID" value="test123">
        <input type="password" id="testPassword" placeholder="Passwort" value="password123">
        
        <button onclick="testRegistration()">📝 Registrieren</button>
        <button onclick="testCheckMember()">🔍 Prüfen</button>
        <button onclick="testGetRole()">👤 Rolle abrufen</button>
        <button onclick="testDeleteMember()">🗑️ Löschen</button>
        <button onclick="clearResults()">🧹 Ergebnisse löschen</button>
    </div>
    
    <div id="results"></div>

    <script>
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }

        async function testRegistration() {
            const name = document.getElementById('testName').value;
            const nachname = document.getElementById('testNachname').value;
            const email = document.getElementById('testEmail').value;
            const id = document.getElementById('testId').value;
            const password = document.getElementById('testPassword').value;

            addResult(`🔄 Registriere ${name} ${nachname}...`, 'info');

            try {
                const response = await fetch('http://localhost:3001/save-member', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, nachname, email, id, password })
                });

                const result = await response.text();
                if (response.ok) {
                    addResult(`✅ Registrierung erfolgreich: ${result}`, 'success');
                } else {
                    addResult(`❌ Registrierung fehlgeschlagen: ${result}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Fehler bei der Registrierung: ${error.message}`, 'error');
            }
        }

        async function testCheckMember() {
            const name = document.getElementById('testName').value;
            const nachname = document.getElementById('testNachname').value;

            addResult(`🔍 Prüfe ob ${name} ${nachname} existiert...`, 'info');

            try {
                const response = await fetch(`http://localhost:3001/check-member?name=${encodeURIComponent(name)}&nachname=${encodeURIComponent(nachname)}`);
                const result = await response.json();
                
                if (response.ok) {
                    addResult(`✅ Mitglied existiert: ${result.exists}`, 'success');
                } else {
                    addResult(`❌ Prüfung fehlgeschlagen: ${result.error || 'Unbekannter Fehler'}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Fehler bei der Prüfung: ${error.message}`, 'error');
            }
        }

        async function testGetRole() {
            const name = document.getElementById('testName').value;
            const nachname = document.getElementById('testNachname').value;

            addResult(`👤 Rolle für ${name} ${nachname} abrufen...`, 'info');

            try {
                const response = await fetch(`http://localhost:3001/get-role?name=${encodeURIComponent(name)}&nachname=${encodeURIComponent(nachname)}`);
                const result = await response.json();
                
                if (response.ok) {
                    addResult(`✅ Rolle: ${result.role}`, 'success');
                } else {
                    addResult(`❌ Rollenabfrage fehlgeschlagen: ${result.error || 'Unbekannter Fehler'}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Fehler bei der Rollenabfrage: ${error.message}`, 'error');
            }
        }

        async function testDeleteMember() {
            const name = document.getElementById('testName').value;
            const nachname = document.getElementById('testNachname').value;

            if (confirm(`Möchtest du ${name} ${nachname} wirklich löschen?`)) {
                addResult(`🗑️ Lösche ${name} ${nachname}...`, 'info');

                try {
                    const response = await fetch('http://localhost:3001/delete-member', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ name, nachname })
                    });

                    const result = await response.text();
                    if (response.ok) {
                        addResult(`✅ Mitglied gelöscht: ${result}`, 'success');
                    } else {
                        addResult(`❌ Löschung fehlgeschlagen: ${result}`, 'error');
                    }
                } catch (error) {
                    addResult(`❌ Fehler bei der Löschung: ${error.message}`, 'error');
                }
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            addResult('🧹 Ergebnisse gelöscht - Bereit für neue Tests', 'info');
        }

        // Initial message
        addResult('🚀 MongoDB Registrierung Test bereit - Server sollte auf http://localhost:3001 laufen', 'info');
    </script>
</body>
</html>
